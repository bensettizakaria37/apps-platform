stages:
  - test
  - deploy

variables:
  PYTHON_VERSION: "3.11"

test-backend:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r backend/requirements.txt --break-system-packages || pip install -r backend/requirements.txt
  script:
    - cd backend
    - python -m pytest tests/ -v
  only:
    - main

test-frontend:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - curl -s -X POST "$EASYPANEL_BACKEND_WEBHOOK"
    - curl -s -X POST "http://169.255.179.10:3000/api/deploy/a2dcf2aa2d321cd846065303f57fa9ae6afd43837f76c133"
  only:
    - main
  needs:
    - test-backend
    - test-frontend

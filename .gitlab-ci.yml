stages:
  - test
  - build
  - deploy

variables:
  BACKEND_IMAGE: registry.gitlab.cloudfactory.ma/root/apps-platform/backend:latest
  FRONTEND_IMAGE: registry.gitlab.cloudfactory.ma/root/apps-platform/frontend:latest

test-backend:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update -q && apt-get install -y tesseract-ocr poppler-utils ghostscript
    - pip install -r backend/requirements.txt
  script:
    - cd backend && python3 -m pytest tests/ -v --tb=short
  variables:
    DATABASE_URL: ""
    FERNET_KEY: "MYzePYVJA1zqPQxRMvhYbSxlJ-QbWsae2zGkg6yJJX0="

test-frontend:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend && npm install
  script:
    - npm run build

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f Dockerfile.backend -t $BACKEND_IMAGE .
    - docker push $BACKEND_IMAGE
  only:
    - main

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f Dockerfile.frontend -t $FRONTEND_IMAGE .
    - docker push $FRONTEND_IMAGE
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - kubectl rollout restart deployment/backend -n apps-platform
    - kubectl rollout restart deployment/frontend -n apps-platform
  only:
    - main

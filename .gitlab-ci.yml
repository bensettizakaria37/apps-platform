stages:
  - test
  - deploy-staging
  - deploy-prod

test-backend:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update -q && apt-get install -y tesseract-ocr poppler-utils ghostscript
    - pip install -r backend/requirements.txt
  script:
    - cd backend
    - python3 -m pytest tests/ -v --tb=short
  variables:
    DATABASE_URL: ""
    FERNET_KEY: "MYzePYVJA1zqPQxRMvhYbSxlJ-QbWsae2zGkg6yJJX0="

test-frontend:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend && npm install
  script:
    - npm run build

deploy-staging:
  stage: deploy-staging
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - curl -s -X POST $EASYPANEL_BACKEND_STAGING_WEBHOOK
    - curl -s -X POST $EASYPANEL_FRONTEND_STAGING_WEBHOOK
  needs:
    - test-backend
    - test-frontend
  only:
    - staging

deploy-prod:
  stage: deploy-prod
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - curl -s -X POST $EASYPANEL_BACKEND_WEBHOOK
    - curl -s -X POST $EASYPANEL_FRONTEND_WEBHOOK
  needs:
    - test-backend
    - test-frontend
  only:
    - main

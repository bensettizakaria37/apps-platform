name: CI/CD — Apps Platform

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr poppler-utils ghostscript

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: |
          cd backend
          python3 -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: ""
          FERNET_KEY: "dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build && echo "✅ Build OK"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Easypanel — Backend
        run: |
          curl -s -X POST \
            "http://169.255.179.10:3000/api/deploy/a79638f234b2069181b4be05c4e1f7fdb46e8702348f721c" \
            -H "Content-Type: application/json" \
            -w "\nHTTP: %{http_code}"

      - name: Trigger Easypanel — Frontend
        run: |
          curl -s -X POST \
            "${{ secrets.EASYPANEL_FRONTEND_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP: %{http_code}"
